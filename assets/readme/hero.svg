<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-label="SOC-Octopus-Agent banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect x="70" y="70" width="176" height="12" rx="6" fill="url(#accent)"/>
  <text x="72" y="168" fill="#f8fafc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="68" font-weight="700">SOC-Octopus-Agent</text>
  <text x="72" y="220" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="400">
    Automacao SOC, workflows n8n, IA, MCP, PostgreSQL e Redis em um lab controlado
  </text>

  <g filter="url(#shadow)">
    <rect x="72" y="268" width="154" height="44" rx="12" fill="#13233f" stroke="#29425e"/>
    <text x="149" y="297" text-anchor="middle" fill="#a7f3d0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600">n8n</text>

    <rect x="234" y="268" width="208" height="44" rx="12" fill="#13233f" stroke="#29425e"/>
    <text x="338" y="297" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600">SOC / SOAR / Copilot</text>

    <rect x="450" y="268" width="168" height="44" rx="12" fill="#13233f" stroke="#29425e"/>
    <text x="534" y="297" text-anchor="middle" fill="#fde68a" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600">PostgreSQL</text>

    <rect x="626" y="268" width="116" height="44" rx="12" fill="#13233f" stroke="#29425e"/>
    <text x="684" y="297" text-anchor="middle" fill="#bae6fd" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18" font-weight="600">Redis</text>
  </g>

  <g opacity="0.12" stroke="#93c5fd" stroke-width="2">
    <path d="M970 84 L1370 84"/>
    <path d="M970 150 L1370 150"/>
    <path d="M970 216 L1370 216"/>
    <path d="M970 282 L1370 282"/>
    <path d="M970 348 L1370 348"/>
    <path d="M1004 48 L1004 372"/>
    <path d="M1112 48 L1112 372"/>
    <path d="M1220 48 L1220 372"/>
    <path d="M1328 48 L1328 372"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="84" width="248" height="92" rx="18" fill="#0f172a" stroke="#334155"/>
    <rect x="1200" y="76" width="236" height="108" rx="18" fill="#10213a" stroke="#475569"/>
    <rect x="1016" y="212" width="260" height="108" rx="18" fill="#10213a" stroke="#475569"/>
    <rect x="1300" y="220" width="160" height="100" rx="18" fill="#0f172a" stroke="#334155"/>
    <circle cx="1028" cy="108" r="10" fill="#4fd1c5"/>
    <circle cx="1222" cy="108" r="10" fill="#f59e0b"/>
    <circle cx="1048" cy="238" r="10" fill="#7dd3fc"/>
    <circle cx="1320" cy="246" r="10" fill="#a78bfa"/>
    <text x="1050" y="118" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">Lab</text>
    <text x="1244" y="118" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">Workflows</text>
    <text x="1070" y="250" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">Validadores</text>
    <text x="1342" y="258" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="600">Seguranca</text>
  </g>
</svg>
