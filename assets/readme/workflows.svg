<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-label="Mapa visual dos workflows principais">
  <defs>
    <style>
      .title { font: 700 28px "Segoe UI", Inter, Arial, sans-serif; fill: #e2e8f0; }
